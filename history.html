<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park - History</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="history-page">

  <div class="topbar">
    <div class="topbar-logo">Park</div>

    <div class="topbar-right">
      <a href="dashboard.html" class="nav-link"><- Parking</a>

      <div class="user-chip" id="user-chip" onclick="toggleDrop()">
        <span class="chip-name" id="chip-name">-</span>
        <span class="chip-plate" id="chip-plate">-</span>
        <div class="user-drop" id="user-drop">
          <div class="drop-row"><b id="d-name">-</b>Driver</div>
          <div class="drop-row"><b id="d-phone">-</b>Phone</div>
          <div class="drop-row"><b id="d-plate">-</b>Plate</div>
          <button class="drop-out" onclick="signOut()">Sign out</button>
        </div>
      </div>

      <div class="topbar-clock" id="clock">-</div>
    </div>
  </div>

  <div class="history-content">
    <div class="page-title">Trip History</div>

    <!-- stats -->
    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-cell">
        <div class="stat-val" id="st-trips">0</div>
        <div class="stat-lbl">Total trips</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="st-cost">$0</div>
        <div class="stat-lbl">Total spent</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="st-avg-dur">-</div>
        <div class="stat-lbl">Avg duration</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="st-avg-cost">-</div>
        <div class="stat-lbl">Avg cost</div>
      </div>
    </div>

    <!-- trip list -->
    <div class="trip-list" id="trip-list">
      <div class="no-trips">No trips yet. Reserve your first spot on the <a href="dashboard.html" style="color:var(--ink)">parking map</a>.</div>
    </div>
  </div>
</div>

<script>
// чек авторизация
let userData = localStorage.getItem('park_user');
let user = null;

if (userData) {
  user = JSON.parse(userData);
}

if (!user) {
  window.location.href = 'register.html';
}

document.getElementById('chip-name').textContent = user.name.split(' ')[0];
document.getElementById('chip-plate').textContent = user.plate;

document.getElementById('d-name').textContent = user.name;
document.getElementById('d-phone').textContent = user.phone;
document.getElementById('d-plate').textContent = user.plate;


function formatDur(min) {
  if (min < 60) {
    return min + "m";
  } else {
    let h = Math.floor(min / 60);
    let m = min % 60;
    return h + "h " + m + "m";
  }
}


// history
let historyData = localStorage.getItem('park_history');
let tripHistory = [];

if (historyData) {
  tripHistory = JSON.parse(historyData);
}


// if exists historyy
if (tripHistory.length > 0) {

  // общая сумма типа
  let totalCost = 0;
  for (let i = 0; i < tripHistory.length; i++) {
    totalCost += tripHistory[i].cost;
  }

  // длительность
  let totalMinutes = 0;
  for (let i = 0; i < tripHistory.length; i++) {
    totalMinutes += tripHistory[i].duration;
  }

  let avgMin = Math.round(totalMinutes / tripHistory.length);

  // avg cost
  let avgCost = (totalCost / tripHistory.length).toFixed(2);

  document.getElementById('st-trips').textContent = tripHistory.length;
  document.getElementById('st-cost').textContent = "$" + totalCost.toFixed(2);
  document.getElementById('st-avg-dur').textContent = formatDur(avgMin);
  document.getElementById('st-avg-cost').textContent = "$" + avgCost;

  document.getElementById('stats-row').style.display = "flex";


  // listtt
  let html = "";

  for (let i = 0; i < tripHistory.length; i++) {
    let t = tripHistory[i];

    let evText = "";
    if (t.ev) {
      evText = " . EV";
    }

    html += `
      <div class="trip-row">
        <div class="trip-spot">${t.label}</div>
        <div class="trip-info">
          Level ${t.floor} . <strong>${t.type}</strong>${evText}<br>
          ${t.date} at ${t.time} . ${t.rate}
        </div>
        <div class="trip-dur">${formatDur(t.duration)}</div>
        <div class="trip-cost">$${t.cost.toFixed(2)}</div>
      </div>
    `;
  }

  document.getElementById('trip-list').innerHTML = html;
}


// clockkk
function updateClock() {
  let d = new Date();

  let time =
    d.getHours().toString().padStart(2, '0') + ":" +
    d.getMinutes().toString().padStart(2, '0') + ":" +
    d.getSeconds().toString().padStart(2, '0');

  document.getElementById('clock').textContent = time;
}

updateClock();
setInterval(updateClock, 1000);


// dropdownn
function toggleDrop() {
  let drop = document.getElementById('user-drop');
  drop.classList.toggle('open');
}


// sign out
function signOut() {
  localStorage.removeItem('park_user');
  localStorage.removeItem('park_history');
  window.location.href = 'register.html';
}


document.addEventListener('click', function (e) {
  let chip = e.target.closest('#user-chip');

  if (!chip) {
    document.getElementById('user-drop').classList.remove('open');
  }
});
// хз работает
</script>

</body>
</html>
