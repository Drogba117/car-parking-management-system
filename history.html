<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Park - History</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="history-page">

  <div class="topbar">
    <div class="topbar-logo">Park</div>

    <div class="topbar-right">
      <a href="dashboard.html" class="nav-link"><- Parking</a>

      <div class="user-chip" id="user-chip" onclick="toggleDrop()">
        <span class="chip-name" id="chip-name">-</span>
        <span class="chip-plate" id="chip-plate">-</span>
        <div class="user-drop" id="user-drop">
          <div class="drop-row"><b id="d-name">-</b>Driver</div>
          <div class="drop-row"><b id="d-phone">-</b>Phone</div>
          <div class="drop-row"><b id="d-plate">-</b>Plate</div>
          <button class="drop-out" onclick="signOut()">Sign out</button>
        </div>
      </div>

      <div class="topbar-clock" id="clock">-</div>
    </div>
  </div>

  <div class="history-content">
    <div class="page-title">Trip History</div>

    <!-- stats -->
    <div class="stats-row" id="stats-row" style="display:none">
      <div class="stat-cell">
        <div class="stat-val" id="st-trips">0</div>
        <div class="stat-lbl">Total trips</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="st-cost">$0</div>
        <div class="stat-lbl">Total spent</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="st-avg-dur">-</div>
        <div class="stat-lbl">Avg duration</div>
      </div>
      <div class="stat-cell">
        <div class="stat-val" id="st-avg-cost">-</div>
        <div class="stat-lbl">Avg cost</div>
      </div>
    </div>

    <!-- trip list -->
    <div class="trip-list" id="trip-list">
      <div class="no-trips">No trips yet. Reserve your first spot on the <a href="dashboard.html" style="color:var(--ink)">parking map</a>.</div>
    </div>
  </div>
</div>


</body>
</html>
