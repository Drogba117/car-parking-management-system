<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Park-Register</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

</head>
<body>
  <div class="reg-screen">
    <div class="reg-card">
      <div class="reg-wordmark">Park</div>

      <div class="progress">
        <div class="prog-dot active" id="p1"></div>
        <div class="prog-dot" id="p2"></div>
        <div class="prog-dot" id="p3"></div>
      </div>

      <!-- name -->
      <div class="reg-step show" id="rs1">
        <div class="step-heading">Your name</div>
        <div class="step-hint">Enter your full name to get started</div>
        <div class="f">
          <label">Full Name</label>
          <input type="text" id="i-name" placeholder="Name Surname" autocomplete="off">
          <div class="f-err" id="e-name"></div>

        </div>
        <button class="btn-main" onclick="">Continue -></button>
      </div>

      <!-- phone -->
        <div class="reg-step" id="rs2">
        <div class="step-heading">Phone Number</div>
        <div class="step-hint">We will use this to identify your account.</div>
        <div class="f">
          <label>Phone</label>
          <input type="tel" id="i-phone" placeholder="+7 777 777 77 77" autocomplete="off">
          <div class="f-err" id="e-phone"></div>
        </div>
        <button class="btn-main" onclick="">Continue -></button>
        </div>

        <!-- number of car -->
        <div class="reg-step" id="rs3">
          <div class="step-heading">License Plate</div>
          <div class="step-hint">Enter your vehicle's plate number.</div>
          <div class="f">
            <label>Plate Number</label>
            <input type="text" id="i-plate" placeholder="111 LLL 11" autocomplete="off" oninput="this.value=this.value.toUpperCase()">
            <div class="f-err" id="e-plate"></div>
          </div>
          <button class="btn-main" onclick="">Go to Parking -></button>

        </div>
    </div>
  </div>
</body>
</html>
